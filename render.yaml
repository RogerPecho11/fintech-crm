services:
  # ── Backend ──────────────────────────────────────────────────────────────────
  - type: web
    name: prontopaga-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: prontopaga-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://prontopaga-frontend.onrender.com
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_FILE_SIZE
        value: "10485760"

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: prontopaga-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://prontopaga-backend.onrender.com

# ── Database ──────────────────────────────────────────────────────────────────
databases:
  - name: prontopaga-db
    databaseName: fintech_crm
    user: prontopaga
    plan: free
