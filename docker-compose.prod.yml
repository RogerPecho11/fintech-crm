services:
  postgres:
    image: postgres:16-alpine
    container_name: fintech_crm_db
    environment:
      POSTGRES_DB: fintech_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ProntoPaga_DB_2024_Secure!
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fintech_crm_backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fintech_crm
      DB_USER: postgres
      DB_PASSWORD: ProntoPaga_DB_2024_Secure!
      JWT_SECRET: ProntoPaga_JWT_SuperSecret_2024_Production!
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: https://crm-onboarding.online
      MYSQL_HOST: replica-produccion-brasil.chm5clze4j9i.us-east-1.rds.amazonaws.com
      MYSQL_PORT: "3306"
      MYSQL_USER: roger.pecho
      MYSQL_PASSWORD: "T9x#vB7q!LmZ2rWdXf6A"
      MYSQL_DATABASE: prontopaga_com
      SMTP_HOST: gtxm1326.siteground.biz
      SMTP_PORT: "465"
      SMTP_USER: gestion@certificaciones.prontopaga.com
      SMTP_PASS: "uf146%4J^9~1"
      EMAIL_FROM: gestion@certificaciones.prontopaga.com
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fintech_crm_frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
